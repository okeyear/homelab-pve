# This is a basic workflow to help you get started with Actions

name: "[ 31 ] Deploy Monitoring k8s Cluster pending"

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner Agent'
        required: true
        default: ubuntu-latest
        type: choice
        options:
          - self-hosted
          - ubuntu-latest

      all_enable:
        description: 'Enable ALL(Below Components)'
        required: true
        default: false
        type: boolean

      prometheus_enable:
        description: 'Enable Prometheus monitoring'
        required: true
        default: false
        type: boolean


      K8S_CLUSTER_NAME:
        description: 'Kubernetes cluster name'
        required: true
        type: string
        default: 'mycluster'


env:
  TAILSCALE_HOST: pve
  TAILSCALE_NET: taile80cb.ts.net
  # VM_TEMPLATE_ID: 2009 # vm模板的ID
  # VM_CIDR: 10.10.10 # vmbr0 vmbr1 的网段
  # MASTER_IP: 10.10.10.11
  # NODE01_IP: 10.10.10.101
  # NODE02_IP: 10.10.10.102
  # VMs: ${{ github.event.inputs.VMs }}
  K8S_CLUSTER_NAME: ${{ github.event.inputs.K8S_CLUSTER_NAME }}


# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  setup:
    name: 🚀 Deploy k8s via kubespray
    # The type of runner that the job will run on
    # runs-on: [self-hosted]
    # runs-on: ubuntu-latest
    runs-on: ${{ github.event.inputs.runner }}
    permissions:
      id-token: write   # 让 GitHub 颁发 OIDC
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v5

      # 1️⃣ 安装基础依赖
      - name: Install OS base packages
        run: |
          missing_pkgs=()
          # package -> command mapping
          declare -A pkg_cmd=(
            [skopeo]=skopeo
            [python3]=python3
            [python3-pip]=pip3
            [python3-venv]=python3
            [jq]=jq
          )

          for pkg in skopeo python3 python3-pip python3-venv jq; do
            cmd="${pkg_cmd[$pkg]}"
            if ! command -v "$cmd" >/dev/null 2>&1; then
              missing_pkgs+=("$pkg")
            fi
          done

          if [ ${#missing_pkgs[@]} -gt 0 ]; then
            echo "Installing missing packages: ${missing_pkgs[*]}"
            sudo apt-get update -yq >/dev/null
            sudo apt-get install -yq "${missing_pkgs[@]}" >/dev/null
          else
            echo "All required commands already exist."
          fi

          # # externally-managed-environment 错误的临时解决方法，后续可以改为在 runner 上正确设置 Python 环境
          sudo rm -rf /usr/lib/python3.*/EXTERNALLY-MANAGED

          if ! command -v yq >/dev/null 2>&1; then
            wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo install -m 755 yq_linux_amd64 /usr/bin/yq
          fi          

      # 2️⃣ 检查 tailscale SSH 免密状态
      - name: Check if already ssh key-based
        id: check-ssh
        run: |
          set +e
          test -d ~/.ssh || mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }} >> ~/.ssh/known_hosts
          ssh -o BatchMode=yes -o ConnectTimeout=5  root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }} exit
          if [ $? -eq 0 ]; then
            echo "keyless=true" >> $GITHUB_OUTPUT
          else
            echo "keyless=false" >> $GITHUB_OUTPUT
          fi      

      # 3️⃣  把 Runner 接入 tailnet
      - name: setup Tailscale Connect (if needed)
        if: steps.check-ssh.outputs.keyless != 'true'
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret:    ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci     # 与 ACL 中的 tag 保持一致
          version: latest # https://pkgs.tailscale.com/stable/#static
          use-cache: 'true'

      # 4️⃣ deploy prometheus stack
      - name: Deploy Prometheus Stack
        if: ${{ github.event.inputs.prometheus_enable == 'true' || github.event.inputs.all_enable == 'true' }}
        run: |
          # 这里直接用 kubectl 连接到 k8s 集群部署监控组件，后续可以改为在 runner 上安装 ansible 和 kubespray 来部署 k8s 集群和监控组件
          # 连接 k8s 集群的前提是 runner 能访问到 k8s API Server，这里假设已经通过 tailnet 实现了网络连接
          # 1. 安装 kube-prometheus-stack，包含 Prometheus、Grafana、Alertmanager 等组件
          # 2. 配置 Grafana 的 admin 密码为 "admin"，并且设置默认的 datasource 和 dashboard
          # 3. 配置 Prometheus 的 Alertmanager，设置一个简单的告警规则，当 node CPU 使用率超过 80% 时触发告警
          # 4. 暴露 Grafana 的 3000 端口，Prometheus 的 9090 端口，以及 Alertmanager 的 9093 端口，方便访问和测试 
          # 5. 后续可以改为部署 Loki 和 Tempo 来收集日志和追踪数据，完善监控体系
          # 6. 注意安全性，生产环境中不建议直接暴露监控组件的端口，应该通过 Ingress 或者 VPN 来访问，并且设置强密码和访问控制 
          # 安装 kube-prometheus-stack
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update
          helm install prometheus-stack prometheus-community/kube-prometheus-stack \
            --namespace monitoring --create-namespace \
            --set grafana.adminPassword=admin \
            --set grafana.service.type=NodePort \
            --set grafana.service.nodePort=3000 \
            --set prometheus.service.type=NodePort \
            --set prometheus.service.nodePort=9090 \
            --set alertmanager.service.type=NodePort \
            --set alertmanager.service.nodePort=9093