# This is a basic workflow to help you get started with Actions

name: "[ 00 ] Setup Services on PVE"

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner Agent'
        required: true
        default: ubuntu-latest
        type: choice
        options:
          - self-hosted
          - ubuntu-latest

      all_enable:
        description: 'Enable ALL(below components)'
        required: true
        default: false
        type: boolean

      docker_enable:
        description: 'Enable Docker'
        required: true
        default: false
        type: boolean

      zot_enable:
        description: 'Enable zot container registry'
        required: true
        default: false
        type: boolean

      rustfs_enable:
        description: 'Enable rustfs'
        required: true
        default: false
        type: boolean

env:
  TAILSCALE_HOST: pve
  TAILSCALE_NET: taile80cb.ts.net
  GHPROXY: https://ghfast.top/
  # VM_TEMPLATE_ID: 2009 # vm模板的ID
  # VM_CIDR: 10.10.10 # vmbr0 vmbr1 的网段
  # MASTER_IP: 10.10.10.11
  # NODE01_IP: 10.10.10.101
  # NODE02_IP: 10.10.10.102
  # VMs: ${{ github.event.inputs.VMs }}
  # K8S_CLUSTER_NAME: ${{ github.event.inputs.K8S_CLUSTER_NAME }}
  # VM_USER: ${{ github.event.inputs.vm_user }}

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  setup:
    name: 🚀 Setup services on PVE
    # The type of runner that the job will run on
    # runs-on: [self-hosted]
    # runs-on: ubuntu-latest
    runs-on: ${{ github.event.inputs.runner }}
    env:
      BASH_ENV: /tmp/k8s-setup-init-bash-env.sh
      GITHUB_TOKEN: ${{ github.token }}
    permissions:
      id-token: write   # 让 GitHub 颁发 OIDC
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      # - uses: actions/checkout@v5

      # 1️⃣ 安装基础依赖
      - name: Install OS base packages
        run: |
          missing_pkgs=()
          # package -> command mapping
          declare -A pkg_cmd=(
            [skopeo]=skopeo
            [python3]=python3
            [python3-pip]=pip3
            [python3-venv]=python3
            [jq]=jq
          )

          for pkg in skopeo python3 python3-pip python3-venv jq; do
            cmd="${pkg_cmd[$pkg]}"
            if ! command -v "$cmd" >/dev/null 2>&1; then
              missing_pkgs+=("$pkg")
            fi
          done

          if [ ${#missing_pkgs[@]} -gt 0 ]; then
            echo "Installing missing packages: ${missing_pkgs[*]}"
            sudo apt-get update -yq >/dev/null
            sudo apt-get install -yq "${missing_pkgs[@]}" >/dev/null
          else
            echo "All required commands already exist."
          fi

          # # externally-managed-environment 错误的临时解决方法，后续可以改为在 runner 上正确设置 Python 环境
          sudo rm -rf /usr/lib/python3.*/EXTERNALLY-MANAGED

          if ! command -v yq >/dev/null 2>&1; then
            wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo install -m 755 yq_linux_amd64 /usr/bin/yq
          fi          

          if ! command -v helm >/dev/null 2>&1; then
            curl -fsSL https://raw.githubusercontent.com/helm/helm/master/scripts/get-helm-3 | bash
          fi    

      # 2️⃣ 检查 tailscale SSH 免密状态
      - name: Check if already ssh key-based
        id: check-ssh
        run: |
          set +e
          test -d ~/.ssh || mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }} >> ~/.ssh/known_hosts
          ssh -o BatchMode=yes -o ConnectTimeout=5  root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }} exit
          if [ $? -eq 0 ]; then
            echo "keyless=true" >> $GITHUB_OUTPUT
          else
            echo "keyless=false" >> $GITHUB_OUTPUT
          fi      

      # 3️⃣  把 Runner 接入 tailnet
      - name: setup Tailscale Connect (if needed)
        if: steps.check-ssh.outputs.keyless != 'true'
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret:    ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci     # 与 ACL 中的 tag 保持一致
          version: latest # https://pkgs.tailscale.com/stable/#static
          use-cache: 'true'

      # 3.5️⃣ 初始化整个 job 可复用的 shell 函数
      - name: Init shared shell functions
        shell: bash
        run: |
          cat > "$BASH_ENV" <<'EOF'
          get_github_latest_release() {
            local repo="$1"
            local api="https://api.github.com/repos/${repo}/releases/latest"
            local max_retries=3
            local attempt=1
            local tag

            while [[ $attempt -le $max_retries ]]; do
              if [[ -n "${GITHUB_TOKEN:-}" ]]; then
                tag="$(curl -fsSL -H "Authorization: Bearer ${GITHUB_TOKEN}" "$api" | jq -r '.tag_name // empty')"
              else
                tag="$(curl -fsSL "$api" | jq -r '.tag_name // empty')"
              fi

              if [[ -n "$tag" ]]; then
                echo "$tag"
                return 0
              fi

              echo "Attempt ${attempt}/${max_retries} failed: ${repo}" >&2
              attempt=$((attempt + 1))
              sleep $((attempt * 2))
            done

            echo "Failed to fetch latest release for ${repo}" >&2
            return 1
          }
          EOF
          chmod 600 "$BASH_ENV"

      # 4️⃣ install docker (if needed)
      - name: Install Docker (if needed)
        if: ${{ github.event.inputs.docker_enable == 'true' || github.event.inputs.all_enable == 'true' }}
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }} << 'EOF'
          if ! command -v docker >/dev/null 2>&1; then
            bash <(curl -f -s --connect-timeout 10 --retry 3 https://linuxmirrors.cn/docker.sh) --source mirrors.tencent.com/docker-ce --source-registry docker.1ms.run --protocol https --install-latested true --close-firewall false --ignore-backup-tips
          else
            echo "Docker is already installed."
          fi
          EOF

      # 5️⃣ install zot (if needed)
      - name: Install Zot (if needed)
        if: ${{ github.event.inputs.zot_enable == 'true' || github.event.inputs.all_enable == 'true' }}
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }} << 'EOF'
          source ~/.bashrc
          cd /root
          if ! command -v zot >/dev/null 2>&1; then
            version=$(get_github_latest_release "project-zot/zot")
            wget -c -O /usr/bin/zot ${GHPROXY}https://github.com/project-zot/zot/releases/download/${version}/zot-linux-amd64
            [ -d /etc/zot ] || mkdir /etc/zot
            # ssl
            NAMES="$(tailscale status --json | jq '.Self.DNSName | .[:-1]' -r)"
            sudo tailscale cert "${NAMES}"
            sudo mv "${NAMES}.crt" /etc/zot/cert.crt
            sudo mv "${NAMES}.key" /etc/zot/cert.key

            # systemd service
            tee /etc/systemd/system/zot.service <<EODF
            [Unit]
            Description=OCI Distribution Registry
            Documentation=https://zotregistry.dev/
            After=network.target auditd.service local-fs.target

            [Service]
            Type=simple
            ExecStart=/usr/bin/zot serve /etc/zot/config.json
            Restart=on-failure
            User=zot
            Group=zot
            LimitNOFILE=500000
            MemoryHigh=2G
            MemoryMax=4G

            [Install]
            WantedBy=multi-user.target
            EODF

            # create zot user and group
            if ! id -u zot >/dev/null 2>&1; then
              adduser --no-create-home --disabled-password --gecos --disabled-login zot
            fi

            # config file
            tee /etc/zot/config.json <<EOCF
            {
              "distSpecVersion": "",
              "storage": {
                "rootDirectory": "/data/zot",
                "dedupe": true,
                "gc": true
              },
              "http": {
                "address": "0.0.0.0",
                "port": "5000",
                "tls": {
                  "cert": "/etc/zot/cert.crt",
                  "key": "/etc/zot/cert.key"
                }
              },
              "log": {
                "level": "info"
              },
              "extensions": {
                "ui": {
                  "enable": true
                },
                "search": {
                  "enable": true,
                  "cve": {
                    "updateInterval": "24h"
                  }
                },
                "sync": {
                  "enable": true,
                  "registries": [
                    {
                      "urls": [
                        "https://docker.1panel.live"
                      ],
                      "onDemand": true
                    }
                  ]
                }
              }
            }
            EOCF

            mkdir -p /data/zot /var/log/zot
            chown -R zot:zot /data/zot /var/log/zot /etc/zot/
            systemctl daemon-reload
            sudo -u zot zot verify /etc/zot/config.json
            systemctl enable zot --now
            systemctl status zot --no-pager -n 5
            # journalctl -xeu zot --no-pager
          else
            echo "Zot is already installed."
          fi
          EOF
      
      # 6️⃣ install rustfs (if needed)
      - name: Install RustFS (if needed)
        if: ${{ github.event.inputs.rustfs_enable == 'true' || github.event.inputs.all_enable == 'true' }}
        run: |
          # on runner, skopeo sync image to pve's local registry
          skopeo copy docker://docker.io/rustfs/rustfs:latest docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/docker.io/rustfs/rustfs:latest

          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }} << 'EOF'
          source ~/.bashrc
          if docker ps --filter "name=rustfs" --filter "status=running" --format "{{.Names}}" | grep -q rustfs; then
            echo "存在正在运行的 rustfs 容器"
          else
            echo "没有找到正在运行的 rustfs 容器"
            docker run -d \
              --restart=always \
              --name rustfs \
              -p 9000:9000 \
              -v /data/rustfs:/data \
              ${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/docker.io/rustfs/rustfs:latest
          fi
          EOF
      - name: Metrics-Server
        if: ${{ github.event.inputs.metricsserver_enable == 'true' || github.event.inputs.all_enable == 'true' }}
        run: |
          # 1. 在runner上下载 metrics-server 的 components.yaml，并且修改启动参数，添加 --kubelet-insecure-tls
          temp_dir=$(mktemp -d) || { echo "创建临时目录失败"; exit 1; }
          trap 'rm -rf "$temp_dir"; echo "清理临时目录: $temp_dir"' EXIT
          echo "临时目录路径: $temp_dir"
          cd $temp_dir
          wget -c https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
          sed -i '/metric-resolution=/a\        - --kubelet-insecure-tls # 加上该启动参数' components.yaml
          image=$(awk '/image:/ {print $2}' components.yaml)
          echo "### skopeo copy docker://${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}"
          skopeo copy docker://${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}
          sed -i "s#${image}#${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}#g" components.yaml


          # 2. rsync到pve上
          rsync -e 'ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null' -avz --partial --progress --inplace components.yaml root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:/root/

          # 3. 到pve上执行
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }} << 'EOF'
          source ~/.bashrc
          export KUBECONFIG=~/.kube/${{ github.event.inputs.K8S_CLUSTER_NAME }}.kubeconfig
          kubectl get nodes -o wide
          cd /root
          kubectl apply -f components.yaml
          kubectl get pod -n kube-system | grep metrics-server
          EOF
