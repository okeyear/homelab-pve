      - name: install ansible
        run: |
          if ! command -v ansible &>/dev/null; then
            pip install ansible-core==2.18.3 netaddr 
            ansible-galaxy collection install ansible.posix \
              community.general \
              community.crypto \
              kubernetes.core \
              ansible.utils
          fi

      - name: download kubespray git repository
        run: |
          git clone https://github.com/kubernetes-sigs/kubespray.git
          cd kubespray/
          cp -rfp inventory/sample inventory/mycluster

      - name: Ansible inventory
        run: |
          cd $GITHUB_WORKSPACE/kubespray  # GITHUB_WORKSPACE=/home/runner/work/homelab-pve/homelab-pve
          # 2️⃣ 根据 workflow_dispatch 输入的 VMs(JSON 数组)动态生成 inventory.ini
          python3 - <<'PY'
          import json
          import os
          import sys

          vms_raw = os.environ.get("VMS_JSON", "")
          vm_user = os.environ.get("VM_USER", "vagrant")

          try:
            vms = json.loads(vms_raw)
          except Exception as e:
            print(f"Invalid VMs JSON: {e}", file=sys.stderr)
            sys.exit(1)

          if not isinstance(vms, list) or not vms:
            print("VMs must be a non-empty JSON array", file=sys.stderr)
            sys.exit(1)

          cp_lines = []
          node_lines = []
          cp_index = 1
          node_index = 1

          for ip in vms:
            if not isinstance(ip, str):
              print(f"Invalid IP item (not string): {ip}", file=sys.stderr)
              sys.exit(1)

            parts = ip.split(".")
            if len(parts) != 4:
              print(f"Invalid IPv4 address: {ip}", file=sys.stderr)
              sys.exit(1)

            try:
              last = int(parts[-1])
            except ValueError:
              print(f"Invalid IPv4 last octet: {ip}", file=sys.stderr)
              sys.exit(1)

            if last < 100:
              host = f"k8s-cp-{cp_index:02d}"
              cp_index += 1
              cp_lines.append(f"{host} ansible_host={ip} ip={ip} ansible_user={vm_user}")
            elif last > 100:
              host = f"k8s-node-{node_index:02d}"
              node_index += 1
              node_lines.append(f"{host} ansible_host={ip} ip={ip} ansible_user={vm_user}")
            else:
              print(f"Unsupported IP by rule (last octet == 100): {ip}", file=sys.stderr)
              sys.exit(1)

          lines = []
          lines.append("[kube_control_plane]")
          lines.extend(cp_lines)
          lines.append("")
          lines.append("[etcd:children]")
          lines.append("kube_control_plane")
          lines.append("")
          lines.append("[kube_node]")
          lines.extend(node_lines)
          lines.append("")

          inventory_path = "inventory/mycluster/inventory.ini"
          with open(inventory_path, "w", encoding="utf-8") as f:
            f.write("\n".join(lines))

          print(f"Generated {inventory_path} with {len(cp_lines)} control-plane and {len(node_lines)} node hosts")
          PY

          cat inventory/mycluster/inventory.ini
        env:
          VMS_JSON: ${{ github.event.inputs.VMs }}

