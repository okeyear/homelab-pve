      #         echo "### skopeo copy docker://${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}"
      #         skopeo copy docker://${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}
      #       done
      #     fi

      # # 9️⃣ 准备 kubespray 的安装命令脚本，包含安装前的准备和安装命令
      # - name: prepare kubespray command on pve
