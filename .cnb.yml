version: "1.2"
# 分支名
main: # 触发分支：在 main 分支上触发
  push: # 触发事件：代码推送时触发
    - name: pipeline-1 # 流水线名称
      imports: https://cnb.cool/pipelines-template/env/-/blob/main/tailscale.yml
      stages:
        - name: stage-1 # 阶段名称
          jobs:
            - name: job-1 # 任务名称
              script: echo "in pipeline-1"
        - name: hello cnb
          script: echo "hello cnb"
        - name: install-tailscale
          script: |
            echo "install tailscale"
            # 1. tailscale 安装脚本
            curl -fsSL https://tailscale.com/install.sh | sh

            # 2. 验证安装
            tailscale version

        - name: debug
          script: echo "$TS_AUTHKEY"
