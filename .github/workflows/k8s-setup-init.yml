# This is a basic workflow to help you get started with Actions

name: "[ 21 ] k8s cluster init settings"

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner Agent'
        required: true
        default: ubuntu-latest
        type: choice
        options:
          - self-hosted
          - ubuntu-latest

      K8S_CLUSTER_NAME:
        description: 'Kubernetes cluster name'
        required: true
        type: string
        default: 'mycluster'

      all_enable:
        description: 'Enable ALL(below components) with one click, it will override individual settings'
        required: true
        default: false
        type: boolean

      metricsserver_enable:
        description: 'Enable Metrics-Server'
        required: true
        default: false
        type: boolean

      metallb_enable:
        description: 'Enable MetalLB'
        required: true
        default: false
        type: boolean

      traefik_enable:
        description: 'Enable Traefik-Ingress-Controller'
        required: true
        default: false
        type: boolean

      certmanager_enable:
        description: 'Enable Cert-Manager'
        required: true   
        default: false
        type: boolean 



      # k8s_version:
      #   description: 'supported stable k8s version https://kubernetes.io/releases/'
      #   required: true
      #   default: '1.34'
      #   type: choice
      #   options:
      #     - '1.32'
      #     - '1.33'
      #     - '1.34'
      #     - '1.35'

env:
  TAILSCALE_HOST: pve
  TAILSCALE_NET: taile80cb.ts.net
  GHPROXY: https://ghfast.top/
  # VM_TEMPLATE_ID: 2009 # vm模板的ID
  # VM_CIDR: 10.10.10 # vmbr0 vmbr1 的网段
  # MASTER_IP: 10.10.10.11
  # NODE01_IP: 10.10.10.101
  # NODE02_IP: 10.10.10.102
  # VMs: ${{ github.event.inputs.VMs }}
  # K8S_CLUSTER_NAME: ${{ github.event.inputs.K8S_CLUSTER_NAME }}
  VM_USER: ${{ github.event.inputs.vm_user }}

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  setup:
    name: 🚀 Deploy k8s via kubespray
    # The type of runner that the job will run on
    # runs-on: [self-hosted]
    # runs-on: ubuntu-latest
    runs-on: ${{ github.event.inputs.runner }}
    permissions:
      id-token: write   # 让 GitHub 颁发 OIDC
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      # - uses: actions/checkout@v5

      # 1️⃣ 安装基础依赖
      - name: Install OS base packages
        run: |
          missing_pkgs=()
          # package -> command mapping
          declare -A pkg_cmd=(
            [skopeo]=skopeo
            [python3]=python3
            [python3-pip]=pip3
            [python3-venv]=python3
            [jq]=jq
          )

          for pkg in skopeo python3 python3-pip python3-venv jq; do
            cmd="${pkg_cmd[$pkg]}"
            if ! command -v "$cmd" >/dev/null 2>&1; then
              missing_pkgs+=("$pkg")
            fi
          done

          if [ ${#missing_pkgs[@]} -gt 0 ]; then
            echo "Installing missing packages: ${missing_pkgs[*]}"
            sudo apt-get update -yq >/dev/null
            sudo apt-get install -yq "${missing_pkgs[@]}" >/dev/null
          else
            echo "All required commands already exist."
          fi

          # # externally-managed-environment 错误的临时解决方法，后续可以改为在 runner 上正确设置 Python 环境
          sudo rm -rf /usr/lib/python3.*/EXTERNALLY-MANAGED

          if ! command -v yq >/dev/null 2>&1; then
            wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo install -m 755 yq_linux_amd64 /usr/bin/yq
          fi          

          if ! command -v helm >/dev/null 2>&1; then
            curl -fsSL https://raw.githubusercontent.com/helm/helm/master/scripts/get-helm-3 | bash
          fi    

      # 2️⃣ 检查 tailscale SSH 免密状态
      - name: Check if already ssh key-based
        id: check-ssh
        run: |
          set +e
          test -d ~/.ssh || mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }} >> ~/.ssh/known_hosts
          ssh -o BatchMode=yes -o ConnectTimeout=5  root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }} exit
          if [ $? -eq 0 ]; then
            echo "keyless=true" >> $GITHUB_OUTPUT
          else
            echo "keyless=false" >> $GITHUB_OUTPUT
          fi      

      # 3️⃣  把 Runner 接入 tailnet
      - name: setup Tailscale Connect (if needed)
        if: steps.check-ssh.outputs.keyless != 'true'
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret:    ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci     # 与 ACL 中的 tag 保持一致
          version: latest # https://pkgs.tailscale.com/stable/#static
          use-cache: 'true'

      # 4️⃣ Metrics-Server
      - name: Metrics-Server
        if: ${{ github.event.inputs.metricsserver_enable == 'true' || github.event.inputs.all_enable == 'true' }}
        run: |
          # 1. 在runner上下载 metrics-server 的 components.yaml，并且修改启动参数，添加 --kubelet-insecure-tls
          temp_dir=$(mktemp -d) || { echo "创建临时目录失败"; exit 1; }
          trap 'rm -rf "$temp_dir"; echo "清理临时目录: $temp_dir"' EXIT
          echo "临时目录路径: $temp_dir"
          cd $temp_dir
          wget -c https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
          sed -i '/metric-resolution=/a\        - --kubelet-insecure-tls # 加上该启动参数' components.yaml
          image=$(awk '/image:/ {print $2}' components.yaml)
          echo "### skopeo copy docker://${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}"
          skopeo copy docker://${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}
          sed -i "s#${image}#${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}#g" components.yaml


          # 2. rsync到pve上
          rsync -e 'ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null' -avz --partial --progress --inplace components.yaml root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:/root/

          # 3. 到pve上执行
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }} << 'EOF'
          source ~/.bashrc
          export KUBECONFIG=~/.kube/${{ github.event.inputs.K8S_CLUSTER_NAME }}.kubeconfig
          kubectl get nodes -o wide
          cd /root
          kubectl apply -f components.yaml
          kubectl get pod -n kube-system | grep metrics-server
          EOF

      # 5️⃣ metalLB
      - name: MetalLB
        if: ${{ github.event.inputs.metallb_enable == 'true' || github.event.inputs.all_enable == 'true' }}
        run: |
          function get_github_latest_release() {
              curl --silent "https://api.github.com/repos/$1/releases/latest" | # Get latest release from GitHub api
              grep '"tag_name":' |                                            # Get tag line
              sed -E 's/.*"([^"]+)".*/\1/'                                    # Pluck JSON value
          }
          metallb_ver=$(get_github_latest_release metallb/metallb)

          # 1. 在runner上下载 metallb 的 metallb.yaml，并且修改镜像地址
          temp_dir=$(mktemp -d) || { echo "创建临时目录失败"; exit 1; }
          trap 'rm -rf "$temp_dir"; echo "清理临时目录: $temp_dir"' EXIT
          echo "临时目录路径: $temp_dir"
          cd $temp_dir
          wget -c https://raw.githubusercontent.com/metallb/metallb/${metallb_ver}/config/manifests/metallb-native.yaml
          images=$(awk '/image:/ {print $2}' metallb-native.yaml)
          for image in $images; do
            echo "### skopeo copy docker://${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}"
            skopeo copy docker://${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}
            sed -i "s#${image}#${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}#g" metallb-native.yaml
          done
          # 2. rsync到pve上
          rsync -e 'ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null' -avz --partial --progress --inplace metallb-native.yaml root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:/root/
          # 3. 到pve上执行
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }} << 'EOF'
          source ~/.bashrc
          export KUBECONFIG=~/.kube/${{ github.event.inputs.K8S_CLUSTER_NAME }}.kubeconfig
          kubectl get nodes -o wide
          cd /root
          kubectl apply -f metallb-native.yaml
          kubectl rollout status deployment/controller -n metallb-system --timeout=180s
          kubectl rollout status daemonset/speaker -n metallb-system --timeout=180s
          kubectl wait --for=condition=Ready pod -n metallb-system --all --timeout=180s
          kubectl get pod -n metallb-system

          tee metallb-config.yaml <<ENDOF
          apiVersion: metallb.io/v1beta1
          kind: IPAddressPool
          metadata:
            name: first-pool
            namespace: metallb-system
          spec:
            addresses:
            # 可分配的 IP 地址,可以指定多个，包括 ipv4、ipv6
            - 10.10.10.120-10.10.10.167
          ---
          apiVersion: metallb.io/v1beta1
          kind: L2Advertisement
          metadata:
            name: example
            namespace: metallb-system
          spec:
            ipAddressPools:
            - first-pool
          ENDOF
          # 
          kubectl apply -f metallb-config.yaml
          EOF

      # 6️⃣ Traefik Ingress Controller
      - name: Traefik Ingress Controller
        if: ${{ github.event.inputs.traefik_enable == 'true' || github.event.inputs.all_enable == 'true' }}
        run: |
          # 1. 在runner上下载 traefik 的 manifests.yaml，并且修改镜像地址
          temp_dir=$(mktemp -d) || { echo "创建临时目录失败"; exit 1; }
          trap 'rm -rf "$temp_dir"; echo "清理临时目录: $temp_dir"' EXIT
          echo "临时目录路径: $temp_dir"
          cd $temp_dir
          helm repo add traefik https://helm.traefik.io/traefik
          helm repo update
          helm pull traefik/traefik
          mv traefik-*.tgz traefik.tgz 
          image=$(helm template traefik.tgz | awk '/image:/ {print $2}')
          image_tag=$(echo $image | awk -F: '{print $2}')

          echo "### skopeo copy docker://${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}"
          skopeo copy docker://${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}
          tee traefik-value.yaml <<ENDFF
          image:
            registry: ${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000
            repository: k8s/traefik
            tag: ${image_tag}
            pullPolicy: IfNotPresent          
          ENDFF

          # 2. rsync到pve上
          rsync -e 'ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null' -avz --partial --progress --inplace ./* root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:/root/

          # 3. 到pve上执行
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }} << 'EOF'
          source ~/.bashrc
          export KUBECONFIG=~/.kube/${{ github.event.inputs.K8S_CLUSTER_NAME }}.kubeconfig
          cd /root
          kubectl create ns traefik-ingress
          helm install traefik traefik.tgz -n traefik-ingress -f traefik-value.yaml 
          EOF

      # 7️⃣ Cert Manager
      - name: cert-manager
        if: ${{ github.event.inputs.certmanager_enable == 'true' || github.event.inputs.all_enable == 'true' }}
        run: |
          # 1. 在runner上下载 cert-manager 的 manifests.yaml，并且修改镜像地址
          temp_dir=$(mktemp -d) || { echo "创建临时目录失败"; exit 1; }
          trap 'rm -rf "$temp_dir"; echo "清理临时目录: $temp_dir"' EXIT
          echo "临时目录路径: $temp_dir"
          cd $temp_dir
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm search repo jetstack/cert-manager --versions | head # v1.20.2
          helm pull jetstack/cert-manager

          version=$(helm search repo jetstack/cert-manager --versions | awk 'NR==2 {print $2}')
          mv cert-manager-${version}.tgz cert-manager.tgz
          images=$(helm template cert-manager.tgz | awk '/image:/ {print $2}' | sed 's@"@@g')
          for image in $images; do
            echo "### skopeo copy docker://${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}"
            skopeo copy docker://${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}
          done

          # 2. rsync到pve上
          rsync -e 'ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null' -avz --partial --progress --inplace ./* root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:/root/

          # 3. 到pve上执行
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }} << 'EOF'
          source ~/.bashrc
          export KUBECONFIG=~/.kube/${{ github.event.inputs.K8S_CLUSTER_NAME }}.kubeconfig
          cd /root
          kubectl create ns cert-manager
          helm upgrade --install \
            cert-manager cert-manager.tgz \
            --namespace cert-manager \
            --create-namespace \
            --set prometheus.enabled=false \
            --set webhook.timeoutSeconds=4 \
            --set global.imageRegistry=${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s
          EOF

      # # 8️⃣ 准备离线包并同步镜像
