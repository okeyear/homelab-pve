      #     if [ "${{ github.event.inputs.skip_file }}" != 'true' ]; then
      #       wget -x -P temp/files -i temp/files.list
      #     fi

      #     if [ "${{ github.event.inputs.skip_image }}" != 'true' ]; then
      #       # 把镜像同步到私有 registry 中（如果需要的话）
