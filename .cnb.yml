version: "1.2"
include:
  - cnb-tempate/tailscale.yml
# 分支名
main: # 触发分支：在 main 分支上触发
  web_trigger_tailscale: # 触发事件：代码推送时触发
    stages:
      - name: debug-tailscale
        script: |
          echo "Debug Tailscale"
          tailscale version

      - name: stage-2 # 阶段名称
        script: |
          echo "$TS_AUTHKEY"
          tailscale netcheck
          tailscale ip -4


