main: # 触发分支：在 main 分支上触发
  web_trigger_tailscale: # 触发事件：代码推送时触发
    tailscale: # 流水线名称
      imports: https://cnb.cool/pipelines-template/env/-/blob/main/tailscale.yml
      stages:
        - name: install-tailscale # 阶段名称
          script: |
            echo "install tailscale"
            # tailscale 安装脚本
            curl -fsSL https://tailscale.com/install.sh | sh

        - name: debug-tailscale # 阶段名称
          script: |
            echo "check"                             
            # 验证安装
            tailscale version
            cat /etc/os-release
            uname -a
            nproc
            free -h
            ps aux | grep tailscale
            tailscale up --authkey=$TS_AUTHKEY --accept-routes=true --accept-dns=true --advertise-tags=ci

            tailscale status
            echo "$TS_AUTHKEY"