# This is a basic workflow to help you get started with Actions

name: "[ 06 ] skopeo sync image"

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner Agent'
        required: true
        default: ubuntu-latest
        type: choice
        options:
          - self-hosted
          - ubuntu-latest

      image_name:
        description: 'docker image name'
        required: true
        default: 'busybox'
        type: string

      container_registry:
        description: 'private container registry'
        required: true
        default: 'aliyun'
        type: choice
        options:
          - tencent
          - aliyun
          - pve


env:
  TAILSCALE_HOST: pve
  TAILSCALE_NET: taile80cb.ts.net
  # GHPROXY: https://ghfast.top/
  CONTAINER_REGISTRY_PASSWD: ${{ secrets.ALIYUN_CR_PASS }}
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  setup:
    name: 🚀 Sync docker image
    # The type of runner that the job will run on
    # runs-on: [self-hosted]
    # runs-on: ubuntu-latest
    runs-on: ${{ github.event.inputs.runner }}
    env:
      GITHUB_TOKEN: ${{ github.token }}
    permissions:
      id-token: write   # 让 GitHub 颁发 OIDC
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      # - uses: actions/checkout@v5

      # 1️⃣ 安装基础依赖
      - name: Install OS base packages
        run: |
          missing_pkgs=()
          # package -> command mapping
          declare -A pkg_cmd=(
            [skopeo]=skopeo
            [python3]=python3
            [python3-pip]=pip3
            [python3-venv]=python3
            [jq]=jq
          )

          for pkg in skopeo python3 python3-pip python3-venv jq; do
            cmd="${pkg_cmd[$pkg]}"
            if ! command -v "$cmd" >/dev/null 2>&1; then
              missing_pkgs+=("$pkg")
            fi
          done

          if [ ${#missing_pkgs[@]} -gt 0 ]; then
            echo "Installing missing packages: ${missing_pkgs[*]}"
            sudo apt-get update -yq >/dev/null
            sudo apt-get install -yq "${missing_pkgs[@]}" >/dev/null
          else
            echo "All required commands already exist."
          fi

          # # externally-managed-environment 错误的临时解决方法，后续可以改为在 runner 上正确设置 Python 环境
          sudo rm -rf /usr/lib/python3.*/EXTERNALLY-MANAGED

          if ! command -v yq >/dev/null 2>&1; then
            wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo install -m 755 yq_linux_amd64 /usr/bin/yq
          fi          

          if ! command -v helm >/dev/null 2>&1; then
            curl -fsSL https://raw.githubusercontent.com/helm/helm/master/scripts/get-helm-3 | bash
          fi    

      # 2️⃣ 检查 tailscale SSH 免密状态
      - name: Check if already ssh key-based
        id: check-ssh
        run: |
          set +e
          test -d ~/.ssh || mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }} >> ~/.ssh/known_hosts
          ssh -o BatchMode=yes -o ConnectTimeout=5  root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }} exit
          if [ $? -eq 0 ]; then
            echo "keyless=true" >> $GITHUB_OUTPUT
          else
            echo "keyless=false" >> $GITHUB_OUTPUT
          fi      

      # 3️⃣  把 Runner 接入 tailnet
      - name: setup Tailscale Connect (if needed)
        if: steps.check-ssh.outputs.keyless != 'true'
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret:    ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci     # 与 ACL 中的 tag 保持一致
          version: latest # https://pkgs.tailscale.com/stable/#static
          use-cache: 'true'

      # 4️⃣ get image name and normalize it
      - name: normalize image name
        run: |
          IMAGE_NAME=${{ github.event.inputs.image_name }}
          # 去掉 image name的@后面的sha256等内容
          IMAGE_NAME="${IMAGE_NAME/@*/}"
          # 如果 image name 中没有 tag，则默认加上 :latest
          if [[ ! "$IMAGE_NAME" =~ : ]]; then
            IMAGE_NAME="${IMAGE_NAME}:latest"
          fi
          # 如果 image name 中没有 registry，则默认加上 docker.io/library/
          case "$IMAGE_NAME" in
              docker.io*|quay.io*|registry.k8s.io*|gcr.io*|ghcr.io*|mcr.microsoft.com*|*.*)
                  image_name="${IMAGE_NAME}" 
                  ;;
              *)
                  if [[ $IMAGE_NAME =~ / ]]; then
                      image_name="docker.io/${IMAGE_NAME}"
                  else
                      image_name="docker.io/library/${IMAGE_NAME}"
                  fi
                  ;;
          esac

          # 大写的IMAGE_NAME， 生成dst_name用
          # 小写的image_name， 是为了生成完整带域名的src_image_name

          dest_name=$(echo "$IMAGE_NAME" | sed 's|/|_|g')
          echo "normalized image name: ${{ github.event.inputs.image_name }} --> $image_name --> $dest_name"

          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          echo "SRC_IMAGE_NAME=$image_name" >> $GITHUB_ENV
          echo "DEST_IMAGE_NAME=$dest_name" >> $GITHUB_ENV

      # 5. sync image to pve's local registry
      - name: sync image to pve local registry
        if: ${{ github.event.inputs.container_registry == 'pve' }}
        run: |
          echo "### syncing image ${{ env.SRC_IMAGE_NAME }} to ${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/${{ env.IMAGE_NAME }}"
          skopeo copy docker://${{ env.SRC_IMAGE_NAME }} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/${{ env.IMAGE_NAME }}

      - name: sync image to aliyun container registry
        if: ${{ github.event.inputs.container_registry == 'aliyun' }}
        run: |
          echo "### syncing image ${{ env.SRC_IMAGE_NAME }} to registry.cn-beijing.aliyuncs.com/my-dockermirrors/${{ env.DEST_IMAGE_NAME }}"

          skopeo copy --dest-creds=okeyear:${CONTAINER_REGISTRY_PASSWD} docker://${{ env.SRC_IMAGE_NAME }} docker://registry.cn-beijing.aliyuncs.com/my-dockermirrors/${{ env.DEST_IMAGE_NAME }}

      - name: sync image to tencent container registry
        if: ${{ github.event.inputs.container_registry == 'tencent' }}
        run: |
          echo "### syncing image ${{ env.SRC_IMAGE_NAME }} to hkccr.ccs.tencentyun.com/devops-mirrors/${{ env.DEST_IMAGE_NAME }}"

          skopeo copy --dest-creds=100008867271:${CONTAINER_REGISTRY_PASSWD} docker://${{ env.SRC_IMAGE_NAME }} docker://hkccr.ccs.tencentyun.com/devops-mirrors/${{ env.DEST_IMAGE_NAME }}
