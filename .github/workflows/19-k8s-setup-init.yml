# This is a basic workflow to help you get started with Actions

name: "[ 19 ] k8s cluster init settings"

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner Agent'
        required: true
        default: ubuntu-latest
        type: choice
        options:
          - self-hosted
          - ubuntu-latest

      K8S_CLUSTER_NAME:
        description: 'Kubernetes cluster name'
        required: true
        type: string
        default: 'mycluster'

      all_enable:
        description: 'Enable ALL(below components) except nfs provisioner'
        required: true
        default: false
        type: boolean

      metricsserver_enable:
        description: 'Enable Metrics-Server'
        required: true
        default: false
        type: boolean

      metallb_enable:
        description: 'Enable MetalLB'
        required: true
        default: false
        type: boolean

      traefik_enable:
        description: 'Enable Traefik-Ingress-Controller'
        required: true
        default: false
        type: boolean

      envoy_enable:
        description: 'Enable Envoy GatewayApi'
        required: true
        default: false
        type: boolean
        
      certmanager_enable:
        description: 'Enable Cert-Manager'
        required: true   
        default: false
        type: boolean 

      csi_nfs:
        description: 'nfs二选一'
        required: true
        default: none
        type: choice
        options:
          - nfs-subdir-external-provisioner
          - csi-driver-nfs(pending todo)
          - none
          - s3(deprecated, not recommended)

      csi:
        description: '选一: pending'
        required: true
        default: none
        type: choice
        options:
          - longhorn
          - rook-ceph
          - openebs
          - local-path
          - none

      # k8s_version:
      #   description: 'supported stable k8s version https://kubernetes.io/releases/'
      #   required: true
      #   default: '1.34'
      #   type: choice
      #   options:
      #     - '1.32'
      #     - '1.33'
      #     - '1.34'
      #     - '1.35'

env:
  TAILSCALE_HOST: pve
  TAILSCALE_NET: taile80cb.ts.net
  GHPROXY: https://ghfast.top/
  # VM_TEMPLATE_ID: 2009 # vm模板的ID
  # VM_CIDR: 10.10.10 # vmbr0 vmbr1 的网段
  # MASTER_IP: 10.10.10.11
  # NODE01_IP: 10.10.10.101
  # NODE02_IP: 10.10.10.102
  # VMs: ${{ github.event.inputs.VMs }}
  # K8S_CLUSTER_NAME: ${{ github.event.inputs.K8S_CLUSTER_NAME }}
  VM_USER: ${{ github.event.inputs.vm_user }}

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  setup:
    name: 🚀 Deploy k8s components
    # The type of runner that the job will run on
    # runs-on: [self-hosted]
    # runs-on: ubuntu-latest
    runs-on: ${{ github.event.inputs.runner }}
    env:
      BASH_ENV: /tmp/k8s-setup-init-bash-env.sh
      GITHUB_TOKEN: ${{ github.token }}
    permissions:
      id-token: write   # 让 GitHub 颁发 OIDC
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      # - uses: actions/checkout@v5

      # 1️⃣ 安装基础依赖
      - name: Install OS base packages
        run: |
          missing_pkgs=()
          # package -> command mapping
          declare -A pkg_cmd=(
            [skopeo]=skopeo
            [python3]=python3
            [python3-pip]=pip3
            [python3-venv]=python3
            [jq]=jq
          )

          for pkg in skopeo python3 python3-pip python3-venv jq; do
            cmd="${pkg_cmd[$pkg]}"
            if ! command -v "$cmd" >/dev/null 2>&1; then
              missing_pkgs+=("$pkg")
            fi
          done

          if [ ${#missing_pkgs[@]} -gt 0 ]; then
            echo "Installing missing packages: ${missing_pkgs[*]}"
            sudo apt-get update -yq >/dev/null
            sudo apt-get install -yq "${missing_pkgs[@]}" >/dev/null
          else
            echo "All required commands already exist."
          fi

          # # externally-managed-environment 错误的临时解决方法，后续可以改为在 runner 上正确设置 Python 环境
          sudo rm -rf /usr/lib/python3.*/EXTERNALLY-MANAGED

          if ! command -v yq >/dev/null 2>&1; then
            wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo install -m 755 yq_linux_amd64 /usr/bin/yq
          fi          

          if ! command -v helm >/dev/null 2>&1; then
            curl -fsSL https://raw.githubusercontent.com/helm/helm/master/scripts/get-helm-3 | bash
          fi    

      # 2️⃣ 检查 tailscale SSH 免密状态
      - name: Check if already ssh key-based
        id: check-ssh
        run: |
          set +e
          test -d ~/.ssh || mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }} >> ~/.ssh/known_hosts
          ssh -o BatchMode=yes -o ConnectTimeout=5  root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }} exit
          if [ $? -eq 0 ]; then
            echo "keyless=true" >> $GITHUB_OUTPUT
          else
            echo "keyless=false" >> $GITHUB_OUTPUT
          fi      

      # 3️⃣  把 Runner 接入 tailnet
      - name: setup Tailscale Connect (if needed)
        if: steps.check-ssh.outputs.keyless != 'true'
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret:    ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci     # 与 ACL 中的 tag 保持一致
          version: latest # https://pkgs.tailscale.com/stable/#static
          use-cache: 'true'

      # 3.5️⃣ 初始化整个 job 可复用的 shell 函数
      - name: Init shared shell functions
        shell: bash
        run: |
          cat > "$BASH_ENV" <<'EOF'
          get_github_latest_release() {
            local repo="$1"
            local api="https://api.github.com/repos/${repo}/releases/latest"
            local max_retries=3
            local attempt=1
            local tag

            while [[ $attempt -le $max_retries ]]; do
              if [[ -n "${GITHUB_TOKEN:-}" ]]; then
                tag="$(curl -fsSL -H "Authorization: Bearer ${GITHUB_TOKEN}" "$api" | jq -r '.tag_name // empty')"
              else
                tag="$(curl -fsSL "$api" | jq -r '.tag_name // empty')"
              fi

              if [[ -n "$tag" ]]; then
                echo "$tag"
                return 0
              fi

              echo "Attempt ${attempt}/${max_retries} failed: ${repo}" >&2
              attempt=$((attempt + 1))
              sleep $((attempt * 2))
            done

            echo "Failed to fetch latest release for ${repo}" >&2
            return 1
          }
          EOF
          chmod 600 "$BASH_ENV"

      # 4️⃣ Metrics-Server
      - name: Metrics-Server
        if: ${{ github.event.inputs.metricsserver_enable == 'true' || github.event.inputs.all_enable == 'true' }}
        run: |
          # 1. 在runner上下载 metrics-server 的 components.yaml，并且修改启动参数，添加 --kubelet-insecure-tls
          temp_dir=$(mktemp -d) || { echo "创建临时目录失败"; exit 1; }
          trap 'rm -rf "$temp_dir"; echo "清理临时目录: $temp_dir"' EXIT
          echo "临时目录路径: $temp_dir"
          cd $temp_dir
          wget -c https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
          sed -i '/metric-resolution=/a\        - --kubelet-insecure-tls # 加上该启动参数' components.yaml
          image=$(awk '/image:/ {print $2}' components.yaml)
          echo "### skopeo copy docker://${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}"
          skopeo copy docker://${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}
          sed -i "s#${image}#${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}#g" components.yaml


          # 2. rsync到pve上
          rsync -e 'ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null' -avz --partial --progress --inplace components.yaml root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:/root/

          # 3. 到pve上执行
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }} << 'EOF'
          source ~/.bashrc
          export KUBECONFIG=~/.kube/${{ github.event.inputs.K8S_CLUSTER_NAME }}.kubeconfig
          kubectl get nodes -o wide
          cd /root
          kubectl apply -f components.yaml
          kubectl get pod -n kube-system | grep metrics-server
          EOF

      # 5️⃣ metalLB
      - name: MetalLB
        if: ${{ github.event.inputs.metallb_enable == 'true' || github.event.inputs.all_enable == 'true' }}
        shell: bash
        run: |
          metallb_ver=$(get_github_latest_release metallb/metallb)
          if [[ -z "$metallb_ver" ]]; then
            echo "Failed to resolve metallb latest release version" >&2
            exit 1
          fi
          echo "Using metallb version: $metallb_ver"

          # 1. 在runner上下载 metallb 的 metallb.yaml，并且修改镜像地址
          temp_dir=$(mktemp -d) || { echo "创建临时目录失败"; exit 1; }
          trap 'rm -rf "$temp_dir"; echo "清理临时目录: $temp_dir"' EXIT
          echo "临时目录路径: $temp_dir"
          cd $temp_dir
          wget -c https://raw.githubusercontent.com/metallb/metallb/${metallb_ver}/config/manifests/metallb-native.yaml
          images=$(awk '/image:/ {print $2}' metallb-native.yaml)
          for image in $images; do
            echo "### skopeo copy docker://${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}"
            skopeo copy docker://${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}
            sed -i "s#${image}#${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}#g" metallb-native.yaml
          done
          # 2. rsync到pve上
          rsync -e 'ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null' -avz --partial --progress --inplace metallb-native.yaml root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:/root/
          # 3. 到pve上执行
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }} << 'EOF'
          source ~/.bashrc
          export KUBECONFIG=~/.kube/${{ github.event.inputs.K8S_CLUSTER_NAME }}.kubeconfig
          kubectl get nodes -o wide
          cd /root
          kubectl apply -f metallb-native.yaml
          kubectl rollout status deployment/controller -n metallb-system --timeout=180s
          kubectl rollout status daemonset/speaker -n metallb-system --timeout=180s
          kubectl wait --for=condition=Ready pod -n metallb-system --all --timeout=180s
          kubectl get pod -n metallb-system

          tee metallb-config.yaml <<ENDOF
          apiVersion: metallb.io/v1beta1
          kind: IPAddressPool
          metadata:
            name: first-pool
            namespace: metallb-system
          spec:
            addresses:
            # 可分配的 IP 地址,可以指定多个，包括 ipv4、ipv6
            - 10.10.10.120-10.10.10.167
          ---
          apiVersion: metallb.io/v1beta1
          kind: L2Advertisement
          metadata:
            name: example
            namespace: metallb-system
          spec:
            ipAddressPools:
            - first-pool
          ENDOF
          # 
          kubectl apply -f metallb-config.yaml
          EOF

      # 6️⃣ Traefik Ingress Controller
      - name: Traefik Ingress Controller
        if: ${{ github.event.inputs.traefik_enable == 'true' || github.event.inputs.all_enable == 'true' }}
        run: |
          # 1. 在runner上下载 traefik 的 manifests.yaml，并且修改镜像地址
          temp_dir=$(mktemp -d) || { echo "创建临时目录失败"; exit 1; }
          trap 'rm -rf "$temp_dir"; echo "清理临时目录: $temp_dir"' EXIT
          echo "临时目录路径: $temp_dir"
          cd $temp_dir
          helm repo add traefik https://helm.traefik.io/traefik
          helm repo update
          helm pull traefik/traefik
          mv traefik-*.tgz traefik.tgz 
          image=$(helm template traefik.tgz | awk '/image:/ {print $2}')
          image_tag=$(echo $image | awk -F: '{print $2}')

          echo "### skopeo copy docker://${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}"
          skopeo copy docker://${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}
          tee traefik-value.yaml <<ENDFF
          image:
            registry: ${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000
            repository: k8s/traefik
            tag: ${image_tag}
            pullPolicy: IfNotPresent          
          ENDFF

          # 2. rsync到pve上
          rsync -e 'ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null' -avz --partial --progress --inplace ./* root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:/root/

          # 3. 到pve上执行
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }} << 'EOF'
          source ~/.bashrc
          export KUBECONFIG=~/.kube/${{ github.event.inputs.K8S_CLUSTER_NAME }}.kubeconfig
          cd /root
          kubectl create ns traefik-ingress
          helm install traefik traefik.tgz -n traefik-ingress -f traefik-value.yaml 
          EOF

      # 7️⃣ Cert Manager
      - name: cert-manager
        if: ${{ github.event.inputs.certmanager_enable == 'true' || github.event.inputs.all_enable == 'true' }}
        shell: bash
        run: |
          # 1. 在runner上下载 cert-manager 的 manifests.yaml，并且修改镜像地址
          temp_dir=$(mktemp -d) || { echo "创建临时目录失败"; exit 1; }
          trap 'rm -rf "$temp_dir"; echo "清理临时目录: $temp_dir"' EXIT
          echo "临时目录路径: $temp_dir"
          cd $temp_dir
          # helm repo add jetstack https://charts.jetstack.io
          # helm repo update
          # helm search repo jetstack/cert-manager --versions | head # v1.20.2
          # helm pull jetstack/cert-manager
          # version=$(helm search repo jetstack/cert-manager --versions | awk 'NR==2 {print $2}')
          # mv cert-manager-${version}.tgz cert-manager.tgz
          # images=$(helm template cert-manager.tgz | awk '/image:/ {print $2}' | sed 's@"@@g')
          version=$(get_github_latest_release "cert-manager/cert-manager")
          if [[ -z "$version" ]]; then
            echo "Failed to resolve cert-manager latest release version" >&2
            exit 1
          fi
          echo "Using cert-manager version: $version"
          wget -c https://github.com/cert-manager/cert-manager/releases/download/${version}/cert-manager.yaml
          images=$(awk '/image:/ {print $2}' cert-manager.yaml | sed 's@"@@g')
          for image in $images; do
            echo "### skopeo copy docker://${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}"
            skopeo copy docker://${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}
            sed -i "s#${image}#${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}#g" cert-manager.yaml
          done

          # 2. rsync到pve上
          rsync -e 'ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null' -avz --partial --progress --inplace ./* root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:/root/

          # 3. 到pve上执行
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }} << 'EOF'
          source ~/.bashrc
          export KUBECONFIG=~/.kube/${{ github.event.inputs.K8S_CLUSTER_NAME }}.kubeconfig
          cd /root
          # kubectl create ns cert-manager
          # helm --timeout 5m0s  upgrade --install \
          #   cert-manager cert-manager.tgz \
          #   --namespace cert-manager \
          #   --create-namespace \
          #   --set installCRDs=true `# crds.enabled=true` \
          #   --set prometheus.enabled=false \
          #   --set webhook.timeoutSeconds=4 \
          #   --set global.imageRegistry=${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s

          # 直接用 kubectl apply 安装 cert-manager，避免 helm 的安装过程过于复杂和冗长，同时也能更清晰地展示安装过程中的每一步
          kubectl apply -f cert-manager.yaml
          kubectl wait --for=condition=Available deployment -n cert-manager --all --timeout=120s

          # 1. SelfSigned ClusterIssuer（引导用）
          #       ↓ 签发
          # 2. Root CA Certificate（isCA: true）
          #       ↓ 存储为 Secret
          # 3. CA ClusterIssuer（实际使用）
          #       ↓ 签发
          # 4. 业务证书 / Ingress TLS / Gateway TLS

          tee cert-manager-config.yaml <<'ENOF'
          # ① SelfSigned 引导 Issuer
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: selfsigned-cluster-bootstrap
          spec:
            selfSigned: {}

          ---
          # ② 根 CA 证书（由引导 Issuer 签发）
          apiVersion: cert-manager.io/v1
          kind: Certificate
          metadata:
            name: selfsigned-root-ca
            # ClusterIssuer 签发的 CA 证书建议放在 cert-manager 命名空间
            namespace: cert-manager
          spec:
            isCA: true
            commonName: "ca.example.com"
            subject:
              countries:
                - "CN"
              localities:
                - BeiJing
              organizations:
                - "Example Inc."
              organizationalUnits:
                - "${{ github.event.inputs.K8S_CLUSTER_NAME }} Kubernetes"        
            dnsNames:
              - ca.example.com                      
            secretName: selfsigned-root-ca-secret # 生成的根 CA 证书会存储在这个 Secret 中
            duration: 876000h    # 100年
            renewBefore: 7200h   # 提前300天续期
            privateKey:
              algorithm: ECDSA
              size: 256
            issuerRef:
              name: selfsigned-cluster-bootstrap # 引用上面创建的引导 ClusterIssuer
              kind: ClusterIssuer
              group: cert-manager.io

          ---
          # ③ CA ClusterIssuer（用根 CA 证书签发业务证书）
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: selfsigned-ca-issuer
          spec:
            ca:
              secretName: selfsigned-root-ca-secret  # 引用上面创建的根 CA Secret       
          ENOF
          kubectl apply -f cert-manager-config.yaml
          EOF

      # 8️⃣ nfs-subdir-external-provisioner
      - name: nfs-subdir-external-provisioner
        if: ${{ github.event.inputs.csi_nfs == 'nfs-subdir-external-provisioner' || github.event.inputs.all_enable == 'true' }}
        run: |
          # 1. 在runner上下载 nfs-subdir-external-provisioner 的 manifests.yaml，并且修改镜像地址
          temp_dir=$(mktemp -d) || { echo "创建临时目录失败"; exit 1; }
          trap 'rm -rf "$temp_dir"; echo "清理临时目录: $temp_dir"' EXIT
          echo "临时目录路径: $temp_dir"
          cd $temp_dir

          tee deploy-nfs-subdir-external-provisioner.sh <<'EOF'
          #!/bin/bash
          set -e

          # 0. pve上安装nfs
          echo "在 PVE 上安装 NFS 服务端和客户端..."
          sudo apt install -yq nfs-kernel-server nfs-common
          [ -d /nfs ] || mkdir /nfs
          sudo chown nobody:nogroup /nfs
          sudo chmod -R 777 /nfs
          # sudo vim /etc/exports
          echo '/nfs  *(sync,wdelay,hide,no_subtree_check,sec=sys,rw,secure,no_root_squash,no_all_squash)' | sudo tee /etc/exports
          sudo exportfs -a
          sudo exportfs -s

          # 该脚本用于在 Kubernetes 集群的所有节点上安装 NFS 客户端，确保 CSI NFS Driver 能够正常工作
          # 1. 获取集群中所有节点的 IP 地址
          nodes=$(kubectl get nodes -o jsonpath='{range .items[*]}{.status.addresses[?(@.type=="InternalIP")].address}{"\n"}{end}')
          echo "集群节点 IP 地址："
          echo "$nodes"
          # 2. 在每个节点上安装 NFS 客户端
          for node in $nodes; do
            echo "正在安装 NFS 客户端到节点 $node..."
            ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null vagrant@$node "sudo apt-get install -y nfs-common || sudo yum install -y nfs-utils"
            echo "节点 $node 上的 NFS 客户端安装完成。"
          done
          # 3. 安装 nfs-subdir-external-provisioner Helm Chart，并且设置镜像地址和 NFS 服务器信息
          helm install nfs-subdir-external-provisioner nfs-subdir-external-provisioner.tgz -n kube-system \
            --set image.repository=${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/sig-storage/nfs-subdir-external-provisioner \
            --set nfs.server=10.10.10.1 \
            --set nfs.path=/nfs      

          helm status -n kube-system nfs-subdir-external-provisioner   
          EOF
          
          # install nfs-subdir-external-provisioner
          helm repo add nfs-subdir-external-provisioner https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner/
          helm repo update
          helm pull nfs-subdir-external-provisioner/nfs-subdir-external-provisioner
          mv nfs-subdir-external-provisioner-*.tgz nfs-subdir-external-provisioner.tgz

          images=$(helm template nfs-subdir-external-provisioner nfs-subdir-external-provisioner/nfs-subdir-external-provisioner |awk '/image:/ {print $2}' | sed 's@"@@g')
          for image in $images; do
            echo "### skopeo copy docker://${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}"
            skopeo copy docker://${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}
          done

          # 2. rsync到pve上
          rsync -e 'ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null' -avz --partial --progress --inplace ./* root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:/root/

          # 3. 到pve上执行
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }} << 'EOF'
          source ~/.bashrc
          export KUBECONFIG=~/.kube/${{ github.event.inputs.K8S_CLUSTER_NAME }}.kubeconfig
          cd /root
          bash deploy-nfs-subdir-external-provisioner.sh
          EOF
      

      # 9️⃣ csi-driver-nfs
      - name: csi-driver-nfs
        if: github.event.inputs.csi_nfs == 'csi-driver-nfs'
        run: |
          echo pending

      - name: local-path provisioner
        if: github.event.inputs.csi == 'local-path'
        run: |
          version=$(get_github_latest_release "rancher/local-path-provisioner")
          wget -c https://raw.githubusercontent.com/rancher/local-path-provisioner/${version}/deploy/local-path-storage.yaml
          images=$(awk '/image:/ {print $2}' local-path-storage.yaml | sed 's@"@@g')
          for image in $images; do
            echo "### skopeo copy docker://docker.io/${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}"
            skopeo copy docker://docker.io/${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}
            sed -i "s#${image}#${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}#g" local-path-storage.yaml
          done

          rsync -e 'ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null' -avz --partial --progress --inplace local-path-storage.yaml root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:/root/
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }} << 'EOF'
          source ~/.bashrc
          export KUBECONFIG=~/.kube/${{ github.event.inputs.K8S_CLUSTER_NAME }}.kubeconfig
          cd /root
          kubectl apply -f local-path-storage.yaml
          EOF

      - name: envoy gateway
        if: ${{ github.event.inputs.envoy_enable == 'true' || github.event.inputs.all_enable == 'true' }}
        run: |
          ChartVersion='v0.0.0-latest'
          helm pull oci://docker.io/envoyproxy/gateway-helm --version ${ChartVersion}
          # gateway-helm-${ChartVersion}.tgz
          images=$(helm template eg gateway-helm-${ChartVersion}.tgz | awk '/image:/{print $NF}' | sort -u)
          for image in $images; do
            echo "### skopeo copy docker://${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}"
            skopeo copy docker://${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}
          done

          wget https://github.com/envoyproxy/gateway/releases/download/latest/quickstart.yaml
          images=$(awk '/image:/{print $NF}' quickstart.yaml | sort -u)
          for image in $images; do
            echo "### skopeo copy docker://${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}"
            skopeo copy docker://${image} docker://${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}
            sed -i "s#${image}#${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s/${image#*/}#g" quickstart.yaml
          done
          ls -lh
          rsync -e 'ssh -o StrictHostKeyChecking=no -o UserKnownHostseFile=/dev/null' -avz --partial --progress --inplace ./gateway-helm-${ChartVersion}.tgz root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:/root/
          rsync -e 'ssh -o StrictHostKeyChecking=no -o UserKnownHostseFile=/dev/null' -av ./quickstart.yaml root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:/root/
          # rsync -e 'ssh -o StrictHostKeyChecking=no -o UserKnownHostseFile=/dev/null' -avz --partial --progress --inplace ./* root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:/root/

          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }} << 'EOF'
          source ~/.bashrc
          ChartVersion='v0.0.0-latest'
          export KUBECONFIG=~/.kube/${{ github.event.inputs.K8S_CLUSTER_NAME }}.kubeconfig
          cd /root
          helm install eg gateway-helm-${ChartVersion}.tgz -n kube-system --create-namespace
          helm install eg oci://docker.io/envoyproxy/gateway-helm \
            --version ${ChartVersion} \
            -n envoy-gateway-system \
            --create-namespace \
            --set global.imageRegistry=${{ env.TAILSCALE_HOST }}.${{ env.TAILSCALE_NET }}:5000/k8s

          kubectl wait --timeout=5m -n envoy-gateway-system deployment/envoy-gateway --for=condition=Available

          kubectl apply -n default -f quickstart.yaml

          EOF

