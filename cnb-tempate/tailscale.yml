main: # 触发分支：在 main 分支上触发
  web_trigger_tailscale: # 触发事件：代码推送时触发
    # tailscale: # 流水线名称
    - docker:
        # 声明使用项目中的 Dockerfile 来构建环境镜像
        build: 
          dockerfile: docker/Dockerfile-debian-tailscale
          buildArgs: "-o context"
      imports: https://cnb.cool/pipelines-template/env/-/blob/main/tailscale.yml
      stages:
        # 下面的脚本任务将在自定义构建的环境中运行   
        # - name: install-tailscale # 阶段名称
        #   script: |
        #     echo "install tailscale"
        #     # tailscale 安装脚本
        #     curl -fsSL https://tailscale.com/install.sh | sh

        - name: debug-tailscale # 阶段名称
          script: |
            echo "check"                             
            # 验证安装
            tailscale version
            cat /etc/os-release
            env
            ls
            uname -a
            # nohup /usr/local/bin/entrypoint.sh 2>&1 &
            tmux new-session -d -s tailscale "/usr/local/bin/entrypoint.sh"
            nproc
            # free -h
            # ps aux | grep tailscale
            # tailscale up --authkey=$TS_AUTHKEY --accept-routes=true --accept-dns=true --advertise-tags=$TS_ADVERTISE_TAGS

            tailscale status
            # echo "$TS_AUTHKEY"